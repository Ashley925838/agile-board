<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Dashboard — AgileBoard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/dashboard}">AgileBoard</a>
        <div class="d-flex align-items-center gap-3">
            <a th:href="@{/projects}" class="text-light text-decoration-none small">Projects</a>
            <span class="text-light small" th:text="${username}">username</span>
            <a th:href="@{/logout}" class="btn btn-outline-light btn-sm">Sign Out</a>
        </div>
    </div>
</nav>

<div class="container mt-5">
    <h4>Welcome back, <span th:text="${username}">user</span> 👋</h4>
    <p class="text-muted mb-4">What would you like to work on today?</p>
    <div class="row g-3">
        <div class="col-md-3">
            <a th:href="@{/projects}" class="card border-0 shadow-sm text-decoration-none text-dark">
                <div class="card-body text-center py-4">
                    <div style="font-size: 2rem;">📁</div>
                    <div class="mt-2 fw-semibold">Projects</div>
                    <div class="text-muted small">Manage your projects</div>
                </div>
            </a>
        </div>
    </div>
</div>

</body>
</html>
