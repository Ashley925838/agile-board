<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Tasks — AgileBoard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/dashboard}">AgileBoard</a>
        <span class="text-light small" th:text="${sprint.name}">Sprint</span>
    </div>
</nav>
<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h4 class="mb-0" th:text="${sprint.name}">Sprint</h4>
            <span class="text-muted small" th:text="${sprint.goal ?: 'No goal'}"></span>
        </div>
        <a th:href="@{/sprints/{id}/tasks/new(id=${sprint.id})}"
           class="btn btn-primary btn-sm">+ Add Task</a>
    </div>

    <div th:if="${#lists.isEmpty(tasks)}" class="text-center py-5 text-muted">
        <p>No tasks yet.</p>
        <a th:href="@{/sprints/{id}/tasks/new(id=${sprint.id})}"
           class="btn btn-outline-primary btn-sm">Add first task</a>
    </div>

    <div class="row g-3">
        <div class="col-12" th:each="task : ${tasks}">
            <div class="card border-0 shadow-sm">
                <div class="card-body d-flex align-items-center justify-content-between">
                    <div>
                        <span class="fw-semibold" th:text="${task.title}">Title</span>
                        <span class="ms-2 badge"
                              th:classappend="${task.priority.name() == 'HIGH'} ? 'bg-danger' :
                                             (${task.priority.name() == 'MEDIUM'} ? 'bg-warning text-dark' : 'bg-secondary')"
                              th:text="${task.priority}">Priority</span>
                        <span class="ms-1 badge bg-light text-dark border"
                              th:text="${task.status}">Status</span>
                        <span class="ms-2 text-muted small"
                              th:if="${task.assignedTo != null}"
                              th:text="'→ ' + ${task.assignedTo.username}"></span>
                    </div>
                    <form th:action="@{/tasks/{id}/delete(id=${task.id})}" method="post">
                        <input type="hidden" name="sprintId" th:value="${sprint.id}">
                        <button type="submit" class="btn btn-sm btn-outline-danger"
                                onclick="return confirm('Delete task?')">Delete</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
