<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
<head>
    <meta charset="UTF-8">
    <title>Dashboard — AgileBoard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <span class="navbar-brand">AgileBoard</span>
        <div class="d-flex align-items-center gap-3">
            <span class="text-light small" sec:authentication="name">username</span>
            <a href="/logout" class="btn btn-outline-light btn-sm">Sign Out</a>
        </div>
    </div>
</nav>
<div class="container mt-5">
    <h2>Dashboard</h2>
    <p class="text-muted">Sprint 1 complete — authentication working ✅</p>
</div>
</body>
</html>
