<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>New Task — AgileBoard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/dashboard}">AgileBoard</a>
    </div>
</nav>
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card border-0 shadow-sm">
                <div class="card-body p-4">
                    <h5 class="mb-1">Add Task</h5>
                    <p class="text-muted small mb-4" th:text="${sprint.name}">Sprint</p>
                    <form th:action="@{/sprints/{id}/tasks(id=${sprint.id})}" method="post">
                        <div class="mb-3">
                            <label class="form-label">Title</label>
                            <input type="text" name="title" class="form-control" required autofocus>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Description <span class="text-muted">(optional)</span></label>
                            <textarea name="description" class="form-control" rows="2"></textarea>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Priority</label>
                            <select name="priority" class="form-select">
                                <option th:each="p : ${priorities}"
                                        th:value="${p}"
                                        th:text="${p}">Priority</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Assign to <span class="text-muted">(optional)</span></label>
                            <select name="assignedToId" class="form-select">
                                <option value="">— Unassigned —</option>
                                <option th:each="user : ${users}"
                                        th:value="${user.id}"
                                        th:text="${user.username}">User</option>
                            </select>
                        </div>
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">Add Task</button>
                            <a th:href="@{/sprints/{id}/tasks(id=${sprint.id})}"
                               class="btn btn-outline-secondary">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
