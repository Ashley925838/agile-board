<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>New Sprint — AgileBoard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/dashboard}">AgileBoard</a>
    </div>
</nav>
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card border-0 shadow-sm">
                <div class="card-body p-4">
                    <h5 class="mb-1">New Sprint</h5>
                    <p class="text-muted small mb-4"
                       th:text="${project.name}">Project</p>
                    <form th:action="@{/projects/{id}/sprints(id=${project.id})}" method="post">
                        <div class="mb-3">
                            <label class="form-label">Sprint Name</label>
                            <input type="text" name="name" class="form-control"
                                   placeholder="e.g. Sprint 1" required autofocus>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Sprint Goal <span class="text-muted">(optional)</span></label>
                            <input type="text" name="goal" class="form-control"
                                   placeholder="e.g. Complete user authentication">
                        </div>
                        <div class="row g-2 mb-3">
                            <div class="col">
                                <label class="form-label">Start Date</label>
                                <input type="date" name="startDate" class="form-control" required>
                            </div>
                            <div class="col">
                                <label class="form-label">End Date</label>
                                <input type="date" name="endDate" class="form-control" required>
                            </div>
                        </div>
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">Create Sprint</button>
                            <a th:href="@{/projects/{id}/sprints(id=${project.id})}"
                               class="btn btn-outline-secondary">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
