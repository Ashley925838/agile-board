<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login — AgileBoard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container d-flex justify-content-center align-items-center" style="min-height: 100vh;">
    <div class="card shadow-sm" style="width: 400px;">
        <div class="card-body p-4">

            <h4 class="card-title mb-1">AgileBoard</h4>
            <p class="text-muted mb-4">Sign in to your account</p>

            <!-- 登录失败提示 -->
            <div th:if="${param.error}" class="alert alert-danger py-2">
                Invalid username or password.
            </div>

            <!-- 注册成功提示 -->
            <div th:if="${param.registered}" class="alert alert-success py-2">
                Account created! Please sign in.
            </div>

            <!-- 登出成功提示 -->
            <div th:if="${param.logout}" class="alert alert-info py-2">
                You have been signed out.
            </div>

            <!-- Spring Security 的登录表单必须 POST 到 /login -->
            <form th:action="@{/login}" method="post">
                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <input type="text" name="username" class="form-control" required autofocus>
                </div>
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">Sign In</button>
            </form>

            <hr>
            <p class="text-center mb-0">
                No account? <a th:href="@{/register}">Register here</a>
            </p>
        </div>
    </div>
</div>

</body>
</html>
