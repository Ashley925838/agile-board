<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Register — AgileBoard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container d-flex justify-content-center align-items-center" style="min-height: 100vh;">
    <div class="card shadow-sm" style="width: 440px;">
        <div class="card-body p-4">

            <h4 class="card-title mb-1">Create Account</h4>
            <p class="text-muted mb-4">Join AgileBoard</p>

            <!-- 业务逻辑错误（用户名已存在等） -->
            <div th:if="${error}" class="alert alert-danger py-2" th:text="${error}"></div>

            <form th:action="@{/register}" method="post" th:object="${registerDto}">

                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <input type="text" th:field="*{username}" class="form-control"
                           th:classappend="${#fields.hasErrors('username')} ? 'is-invalid'">
                    <div class="invalid-feedback" th:errors="*{username}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" th:field="*{email}" class="form-control"
                           th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'">
                    <div class="invalid-feedback" th:errors="*{email}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" th:field="*{password}" class="form-control"
                           th:classappend="${#fields.hasErrors('password')} ? 'is-invalid'">
                    <div class="invalid-feedback" th:errors="*{password}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Confirm Password</label>
                    <input type="password" th:field="*{confirmPassword}" class="form-control"
                           th:classappend="${#fields.hasErrors('confirmPassword')} ? 'is-invalid'">
                    <div class="invalid-feedback" th:errors="*{confirmPassword}"></div>
                </div>

                <button type="submit" class="btn btn-primary w-100">Create Account</button>
            </form>

            <hr>
            <p class="text-center mb-0">
                Already have an account? <a th:href="@{/login}">Sign in</a>
            </p>
        </div>
    </div>
</div>

</body>
</html>
