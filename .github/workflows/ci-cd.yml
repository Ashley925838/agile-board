name: AgileBoard CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # Step 1: 编译
      - name: Compile
        run: mvn compile

      # Step 2: 单元测试（失败则流水线停止）
      - name: Run unit tests
        run: mvn test

      # Step 3: OWASP 安全扫描（DevSecOps）
      - name: OWASP Dependency Check
        run: |
          mvn org.owasp:dependency-check-maven:check \
            -Dformat=HTML \
            -DfailBuildOnCVSS=9
        continue-on-error: true

      # Step 4: 打包 JAR
      - name: Build JAR
        run: mvn package -DskipTests

      # Step 5: 构建 Docker 镜像
      # 这一步验证 Dockerfile 是否正确、应用能否成功容器化
      - name: Build Docker image
        run: docker build -t agile-board:latest .

      # Step 6: 模拟部署
      - name: Deploy (simulated)
        run: |
          echo "✅ Docker image built successfully"
          echo "✅ Deploy successful! AgileBoard is live."
          echo "📦 Image: agile-board:latest"
          echo "🔒 Security scan completed (OWASP)"
          echo "🧪 All unit tests passed"